<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Arte Minimalista</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="logo">
                    <h1>Universal<span>Art</span></h1>
                </div>

                <div class="search-container">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Buscar por título o artista..." autocomplete="off">
                    </div>
                    <button id="searchBtn" class="primary-btn">Buscar</button>
                </div>
            </div>
            <div class="filters-container">
                <select id="filterType" class="filter-select">
                    <option value="">Todas las Técnicas</option>
                    <option value="Painting">Pintura</option>
                    <option value="Sculpture">Escultura</option>
                    <option value="Photography">Fotografía</option>
                    <option value="Textile">Textil</option>
                    <option value="Print">Impresión</option>
                </select>
                
                <select id="filterAuthor" class="filter-select">
                    <option value="">Cualquier Autor (o usa el buscador)</option>
                    <option value="Vincent van Gogh">Vincent van Gogh</option>
                    <option value="Claude Monet">Claude Monet</option>
                    <option value="Pablo Picasso">Pablo Picasso</option>
                    <option value="Rembrandt">Rembrandt</option>
                    <option value="Francisco Goya">Francisco Goya</option>
                </select>
            </div>
        </header>

        <main>
            <div id="gallery" class="gallery-mosaic">
                <!-- Artworks will be injected here -->
            </div>

            <div id="loading" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Cargando obras maestras...</p>
            </div>

            <div id="noResults" class="no-results hidden">
                <i class="fas fa-image"></i>
                <p>No se encontraron resultados. Intenta con otra búsqueda.</p>
            </div>

            <div class="pagination">
                <button id="prevBtn" class="nav-btn" disabled><i class="fas fa-chevron-left"></i> Anterior</button>
                <span id="pageInfo">Página 1</span>
                <button id="nextBtn" class="nav-btn">Siguiente <i class="fas fa-chevron-right"></i></button>
            </div>
        </main>
    </div>

    <!-- Modal Simplificado -->
    <div id="artModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <h3 id="modalArtist"></h3>
                    <p id="modalDesc"></p>
                    <div class="modal-meta">
                        <span id="modalDate"></span>
                        <span id="modalMedium"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
